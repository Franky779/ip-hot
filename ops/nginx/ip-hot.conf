limit_req_zone $binary_remote_addr zone=ip_hot_api:10m rate=30r/s;

upstream ip_hot_next {
    server 127.0.0.1:3101;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name hot.laojia-ip.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    http2 on;
    server_name hot.laojia-ip.com;

    server_tokens off;
    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/hot.laojia-ip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hot.laojia-ip.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/manifest+json application/xml font/woff2 image/svg+xml text/css text/javascript text/plain text/xml;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /_next/static/ {
        proxy_pass http://ip_hot_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location /api/ {
        limit_req zone=ip_hot_api burst=60 nodelay;
        proxy_pass http://ip_hot_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_buffering off;
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }

    location / {
        proxy_pass http://ip_hot_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_buffering off;
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }
}
