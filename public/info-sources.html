<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP NEWS 信息源主库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface-hover: #faf9f7;
  --text: #1a1714;
  --text-secondary: #6b6560;
  --text-muted: #9a948e;
  --accent: #c45c26;
  --accent-light: #f5e6d8;
  --border: #e5e0da;
  --border-light: #f0ede8;
  --shadow: 0 1px 4px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --sidebar-bg: #1a1714;
  --sidebar-text: #a39e98;
  --sidebar-text-hover: #e5e0da;
  --sidebar-active: #c45c26;
  --sidebar-active-bg: rgba(196,92,38,0.12);
  --sidebar-border: rgba(255,255,255,0.06);
  --sidebar-width: 220px;
  --danger: #c23b3b;
  --danger-light: #fceaea;
  --success: #2d8a4e;
  --success-light: #e6f5eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased;
}
.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-width); background: var(--sidebar-bg);
  display: flex; flex-direction: column; z-index: 50; overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid var(--sidebar-border); text-decoration: none;
}
.sidebar-brand-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--accent); color: #fff; font-weight: 700;
  font-size: 0.875rem; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; letter-spacing: 0.05em;
}
.sidebar-brand-text {
  font-family: "Noto Serif SC",serif; font-size: 0.9375rem;
  font-weight: 700; color: var(--sidebar-text-hover); line-height: 1.3;
}
.sidebar-nav { flex: 1; padding: 1rem 0.75rem; }
.sidebar-nav-title {
  font-size: 0.6875rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 0.5rem 0.875rem; margin-top: 0.5rem;
}
.sidebar-link {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.5rem 0.875rem; border-radius: 6px;
  color: var(--sidebar-text); font-size: 0.8125rem;
  text-decoration: none; transition: all 0.2s ease; margin-bottom: 1px;
}
.sidebar-link:hover { color: var(--sidebar-text-hover); background: var(--sidebar-active-bg); }
.sidebar-link.active { color: var(--sidebar-active); background: var(--sidebar-active-bg); font-weight: 500; }
.sidebar-count { margin-left: auto; font-size: 0.6875rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.app-main { flex: 1; margin-left: var(--sidebar-width); min-width: 0; max-width: 1100px; }
.page-header {
  background: var(--surface); border-bottom: 1px solid var(--border-light);
  padding: 1rem 2.5rem 1rem; position: sticky; top: 0; z-index: 40;
}
.page-meta {
  display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;
}
.page-meta-item {
  font-size: 1.25rem; color: var(--text-muted);
}
.page-meta-item strong {
  color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums;
}
.page-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;
}
.search-box { display: flex; align-items: center; gap: 0.5rem; flex: 1; max-width: 360px; }
.search-input {
  flex: 1; padding: 0.625rem 1rem; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.875rem; color: var(--text); font-family: inherit;
  transition: all 0.2s ease; outline: none;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-clear {
  padding: 0.375rem 0.75rem; background: transparent;
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-secondary); font-size: 0.8125rem;
  cursor: pointer; transition: all 0.2s ease; font-family: inherit;
}
.search-clear:hover { border-color: var(--accent); color: var(--accent); }
.filter-tabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  padding: 4px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 999px;
}
.filter-tab {
  padding: 0.4rem 0.875rem; border-radius: 999px;
  font-size: 0.8125rem; color: var(--text-secondary);
  cursor: pointer; border: none; background: transparent;
  transition: all 0.2s ease; white-space: nowrap; font-family: inherit;
}
.filter-tab:hover { color: var(--text); }
.filter-tab.active {
  background: var(--surface); color: var(--accent);
  font-weight: 500; box-shadow: var(--shadow);
}
.content { padding: 2rem 2.5rem 4rem; }
.section { margin-bottom: 3rem; }
.section-header {
  display: flex; align-items: baseline; gap: 0.75rem;
  margin-bottom: 1.25rem; padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-family: "Noto Serif SC",serif; font-size: 1.25rem;
  font-weight: 700; color: var(--text); letter-spacing: 0.02em;
}
.section-count {
  font-size: 0.8125rem; color: var(--text-muted);
  font-weight: 400; font-variant-numeric: tabular-nums;
}
.source-list { display: flex; flex-direction: column; gap: 0.625rem; }
.source-item {
  background: var(--surface); border: 1px solid var(--border-light);
  border-radius: 10px; padding: 1rem 1.25rem;
  transition: all 0.2s ease; position: relative;
}
.source-item:hover {
  border-color: var(--border); box-shadow: var(--shadow-md); transform: translateY(-1px);
}
.source-header {
  display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
}
.source-name {
  font-size: 1rem; font-weight: 700; color: var(--text);
  text-decoration: none; display: inline-flex; align-items: center; gap: 0.375rem;
}
.source-name:hover { color: var(--accent); }
.source-name svg { width: 13px; height: 13px; color: var(--text-muted); flex-shrink: 0; }
.source-name:hover svg { color: var(--accent); }
.source-tag {
  font-size: 0.6875rem; font-weight: 500; color: var(--accent);
  background: var(--accent-light); padding: 0.15rem 0.5rem;
  border-radius: 4px; white-space: nowrap;
}
.source-desc {
  margin-top: 0.375rem; font-size: 0.875rem;
  color: var(--text-secondary); line-height: 1.65; max-width: 75ch;
}
.source-method {
  margin-top: 0.375rem; font-size: 0.75rem;
  color: var(--text-muted); line-height: 1.5;
  font-family: ui-monospace,"SF Mono",Consolas,monospace;
}
.source-actions {
  position: absolute; top: 0.75rem; right: 0.75rem;
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s ease;
}
.source-action-btn {
  padding: 0.25rem 0.5rem; border-radius: 4px;
  font-size: 0.6875rem; border: none; cursor: pointer;
  font-family: inherit; transition: all 0.2s ease;
}
.source-action-btn.edit {
  background: var(--accent-light); color: var(--accent);
}
.source-action-btn.edit:hover { background: var(--accent); color: #fff; }
.source-action-btn.delete {
  background: var(--danger-light); color: var(--danger);
}
.source-action-btn.delete:hover { background: var(--danger); color: #fff; }
.rss-section { margin-bottom: 3rem; }
.rss-table-wrap { overflow-x: auto; }
.rss-table { width: 100%; border-collapse: collapse; }
.rss-table th, .rss-table td {
  text-align: left; padding: 0.625rem 0.875rem;
  border-bottom: 1px solid var(--border-light); font-size: 0.875rem;
}
.rss-table th {
  font-weight: 600; color: var(--text-secondary); font-size: 0.8125rem;
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--surface); position: sticky; top: 0;
}
.rss-table td { color: var(--text); }
.rss-table tr:hover td { background: var(--surface-hover); }
.rss-table a { color: var(--accent); text-decoration: none; }
.rss-table a:hover { text-decoration: underline; }
.rss-note { color: var(--text-muted); font-size: 0.8125rem; }
.tool-grid {
  display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 1rem;
}
.tool-card {
  background: var(--surface); border: 1px solid var(--border-light);
  border-radius: 10px; padding: 1.25rem; transition: all 0.2s ease;
}
.tool-card:hover { border-color: var(--border); box-shadow: var(--shadow-md); }
.tool-name { font-weight: 700; color: var(--text); font-size: 0.9375rem; }
.tool-type { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
.tool-desc { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem; line-height: 1.6; }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.empty-state-title { font-size: 1.125rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; }
.details-block { margin-bottom: 2rem; }
.details-block summary {
  font-family: "Noto Serif SC",serif; font-size: 1.125rem; font-weight: 700;
  color: var(--text); cursor: pointer; padding: 0.75rem 0; list-style: none;
  display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border);
}
.details-block summary::-webkit-details-marker { display: none; }
.details-block summary::before {
  content: "▸"; font-size: 0.875rem; color: var(--accent); transition: transform 0.2s ease;
}
.details-block[open] summary::before { transform: rotate(90deg); }
.details-content { padding: 1rem 0; }
.method-list { display: flex; flex-direction: column; gap: 1.5rem; }
.method-group-title { font-size: 0.9375rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.method-group-items { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.8; }
.method-group-items code {
  background: var(--bg); padding: 0.1rem 0.35rem; border-radius: 4px;
  font-family: ui-monospace,monospace; font-size: 0.8125rem; color: var(--accent);
}
.footer-note {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border); font-size: 0.8125rem;
  color: var(--text-muted); line-height: 1.8;
}
/* Edit controls */
.edit-controls {
  display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
}
.edit-btn {
  padding: 0.4rem 0.75rem; border-radius: 6px;
  font-size: 0.8125rem; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; transition: all 0.2s ease; font-family: inherit;
}
.edit-btn:hover { border-color: var(--accent); color: var(--accent); }
.edit-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.edit-btn.primary:hover { background: #a84d1f; }
.edit-btn.danger { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
.edit-btn.danger:hover { background: var(--danger); color: #fff; }
.edit-btn.success { background: var(--success-light); color: var(--success); border-color: var(--success); }
.edit-btn.success:hover { background: var(--success); color: #fff; }
.edit-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: 12px;
  width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-header {
  padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-title { font-family: "Noto Serif SC",serif; font-size: 1.125rem; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 1.5rem; color: var(--text-muted);
  cursor: pointer; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 1.25rem 1.5rem; }
.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block; font-size: 0.8125rem; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 0.375rem;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 0.5rem 0.75rem;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 0.875rem; font-family: inherit; color: var(--text);
  background: var(--bg); transition: all 0.2s ease; outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light);
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.modal-footer {
  padding: 1rem 1.5rem; border-top: 1px solid var(--border-light);
  display: flex; justify-content: flex-end; gap: 0.5rem;
}
/* Section add button */
.section-add-btn {
  margin-left: auto; padding: 0.25rem 0.625rem;
  font-size: 0.75rem; border: 1px dashed var(--border);
  background: transparent; color: var(--text-muted);
  border-radius: 4px; cursor: pointer; font-family: inherit;
  transition: all 0.2s ease;
}
.section-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
/* Toast */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--text); color: #fff; padding: 0.75rem 1.5rem;
  border-radius: 8px; font-size: 0.875rem; z-index: 200;
  opacity: 0; transition: all 0.3s ease; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* Import/Export area */
.file-ops {
  display: none;
  margin-top: 0.75rem; padding: 0.75rem;
  background: var(--bg); border-radius: 8px; border: 1px dashed var(--border);
}
.file-ops.show { display: block; }
.file-ops-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
#fileInput { display: none; }
@media (max-width: 900px) {
  .sidebar { display: none; }
  .app-main { margin-left: 0; max-width: none; }
  .page-header, .content { padding-left: 1.25rem; padding-right: 1.25rem; }
  .page-toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: none; }
  .filter-tabs { overflow-x: auto; flex-wrap: nowrap; border-radius: 8px; }
  .section-title { font-size: 1.125rem; }
  .form-row { grid-template-columns: 1fr; }
  .source-actions { opacity: 1; position: static; margin-top: 0.5rem; justify-content: flex-end; }
}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar">
  <a href="#" class="sidebar-brand" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
    <div class="sidebar-brand-icon">IP</div>
    <div class="sidebar-brand-text">信息源主库</div>
  </a>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<main class="app-main">
  <div class="page-header">
    <div class="page-meta">
      <span class="page-meta-item"><strong id="statTotal">0</strong> 个站点</span>
      <span class="page-meta-item"><strong id="statRSS">0</strong> 个 RSS 源</span>
      <span class="page-meta-item">更新于 <span id="updateDate">2026-05-17</span></span>
    </div>
    <div class="page-toolbar">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索站点名称、定位或关键词..." autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none">清除</button>
      </div>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="domestic">国内</button>
        <button class="filter-tab" data-filter="overseas">海外</button>
        <button class="filter-tab" data-filter="acg">动漫ACG</button>
        <button class="filter-tab" data-filter="toy">潮玩文创</button>
        <button class="filter-tab" data-filter="film">影视游戏</button>
        <button class="filter-tab" data-filter="finance">财经商业</button>
        <button class="filter-tab" data-filter="media">媒体资讯</button>
        <button class="filter-tab" data-filter="jp">日本</button>
        <button class="filter-tab" data-filter="rss">RSS</button>
      </div>
    </div>
    <div style="margin-top:0.75rem;">
      <div class="edit-controls">
        <button class="edit-btn primary" id="btnAddSite">+ 添加站点</button>
        <button class="edit-btn" id="btnToggleEdit">进入编辑模式</button>
        <button class="edit-btn success" id="btnExport">导出JSON</button>
        <button class="edit-btn" id="btnImport">导入JSON</button>
        <button class="edit-btn danger" id="btnReset">重置默认</button>
      </div>
      <div class="file-ops" id="fileOpsPanel">
        <div class="file-ops-row">
          <span style="font-size:0.8125rem;color:var(--text-secondary);">选择之前导出的JSON文件，数据将覆盖当前内容：</span>
          <input type="file" id="fileInput" accept=".json,application/json">
          <button class="edit-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>
      </div>
    </div>
  </div>

  <div class="content" id="mainContent"></div>
</main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">编辑站点</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>站点名称 *</label>
        <input type="text" id="editName" placeholder="如：三文娱">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>URL *</label>
          <input type="text" id="editUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>标签</label>
          <input type="text" id="editTag" placeholder="如：动漫/IP垂直媒体">
        </div>
      </div>
      <div class="form-group">
        <label>简介描述</label>
        <textarea id="editDesc" placeholder="这个站点的主要内容、价值..."></textarea>
      </div>
      <div class="form-group">
        <label>抓取方式</label>
        <input type="text" id="editMethod" placeholder="如：web-access CDP搜索 → rss-parser">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>所属分类 *</label>
          <select id="editSection"></select>
        </div>
        <div class="form-group">
          <label>区域</label>
          <select id="editRegion">
            <option value="domestic">国内</option>
            <option value="overseas">海外</option>
            <option value="japan">日本</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>标签分类（多选，用逗号分隔）</label>
        <input type="text" id="editTags" placeholder="acg, toy, film, game, finance, media, cultural, social">
      </div>
    </div>
    <div class="modal-footer">
      <button class="edit-btn" id="modalCancel">取消</button>
      <button class="edit-btn primary" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ipnews_data_v1';
const linkIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

const defaultSections = [
  {
    id: 'domestic-acg', title: '动漫 / ACG 垂直媒体', region: 'domestic', tags: ['acg'],
    items: [

  {n:'RSSHub',t:'自建/公网',d:'把不提供RSS的中文站点（微博、公众号、知乎等）转为RSS，可自部署或使用公网 rsshub.app'},
  {n:'Tiny Tiny RSS',t:'自建',d:'开源，适合极客自部署'},
  {n:'The Old Reader',t:'Web',d:'老牌简洁RSS阅读器'},
  {n:'飞书订阅',t:'国内',d:'飞书内置的简易订阅，可对接RSS源'}
];

// Data state
let sections = [];
let rssSections = [];
let tools = [];
let editMode = false;
let editingItem = null;
let editingSectionId = null;

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      sections = data.sections || defaultSections;
      rssSections = data.rssSections || defaultRssSections;
      tools = data.tools || defaultTools;
      return;
    }
  } catch(e) { console.error('Load failed', e); }
  sections = JSON.parse(JSON.stringify(defaultSections));
  rssSections = JSON.parse(JSON.stringify(defaultRssSections));
  tools = JSON.parse(JSON.stringify(defaultTools));
}

function saveData() {
  try {
    const data = { sections, rssSections, tools, savedAt: new Date().toISOString() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN');
  } catch(e) { console.error('Save failed', e); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const siteTotal = () => sections.reduce((a,s)=>a+s.items.length,0);
const rssTotal = () => rssSections.reduce((a,s)=>a+s.items.length,0);

function updateStats() {
  document.getElementById('statTotal').textContent = siteTotal();
  document.getElementById('statRSS').textContent = rssTotal();
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  html += '<div class="sidebar-nav-title">站点分类</div>';
  sections.forEach(sec => {
    html += `<a href="#${sec.id}" class="sidebar-link" data-section="${sec.id}">${sec.title}<span class="sidebar-count">${sec.items.length}</span></a>`;
  });
  html += '<div class="sidebar-nav-title">RSS 与工具</div>';
  html += '<a href="#rss-section" class="sidebar-link" data-section="rss-section">RSS 订阅源<span class="sidebar-count">'+rssTotal()+'</span></a>';
  html += '<a href="#tools-section" class="sidebar-link" data-section="tools-section">聚合器推荐</a>';
  html += '<a href="#methods-section" class="sidebar-link" data-section="methods-section">抓取方式速查</a>';
  nav.innerHTML = html;
}

function renderSourceItem(item, secId) {
  const actions = editMode ? `
    <div class="source-actions">
      <button class="source-action-btn edit" data-action="edit" data-section="${secId}" data-name="${encodeURIComponent(item.n)}">编辑</button>
      <button class="source-action-btn delete" data-action="delete" data-section="${secId}" data-name="${encodeURIComponent(item.n)}">删除</button>
    </div>` : '';
  return `<div class="source-item" data-section="${secId}" data-name="${item.n}">
    ${actions}
    <div class="source-header">
      <a href="${item.u}" target="_blank" rel="noopener noreferrer" class="source-name">${item.n}${linkIcon}</a>
      <span class="source-tag">${item.t}</span>
    </div>
    <div class="source-desc">${item.d}</div>
    <div class="source-method">${item.m}</div>
  </div>`;
}

function renderSection(sec) {
  return `<div class="section" id="${sec.id}">
    <div class="section-header">
      <h2 class="section-title">${sec.title}</h2>
      <span class="section-count">${sec.items.length} 个站点</span>
      ${editMode ? `<button class="section-add-btn" onclick="openAdd('${sec.id}')">+ 添加</button>` : ''}
    </div>
    <div class="source-list">
      ${sec.items.map(it => renderSourceItem(it, sec.id)).join('')}
    </div>
  </div>`;
}

function renderRSS() {
  let html = '<div class="rss-section" id="rss-section">';
  html += '<div class="section-header"><h2 class="section-title">RSS 订阅源</h2><span class="section-count">'+rssTotal()+' 个源</span></div>';
  rssSections.forEach(rss => {
    html += `<h3 style="font-size:0.9375rem;font-weight:600;color:var(--text);margin:1.5rem 0 0.75rem;">${rss.title}</h3>`;
    html += '<div class="rss-table-wrap"><table class="rss-table"><thead><tr><th>站点</th><th>RSS 链接</th><th>备注</th></tr></thead><tbody>';
    rss.items.forEach(item => {
      html += `<tr><td>${item.n}</td><td><a href="${item.u}" target="_blank" rel="noopener noreferrer">${item.u}</a></td><td class="rss-note">${item.note}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  return html;
}

function renderTools() {
  let html = '<div class="section" id="tools-section">';
  html += '<div class="section-header"><h2 class="section-title">RSS 聚合器与工具推荐</h2></div>';
  html += '<div class="tool-grid">';
  tools.forEach(t => {
    html += `<div class="tool-card">
      <div class="tool-name">${t.n}</div>
      <div class="tool-type">${t.t}</div>
      <div class="tool-desc">${t.d}</div>
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function renderMethods() {
  return `<details class="details-block" id="methods-section">
    <summary>抓取方式速查表</summary>
    <div class="details-content">
      <div class="method-list">
        <div>
          <div class="method-group-title">A. RSS 直接订阅（高稳定性，23个）</div>
          <div class="method-group-items">ANN、Crunchyroll、Cartoon Brew、AWN、Animation Magazine、Variety、THR、Deadline、Polygon、Kotaku、Hyperallergic、The Art Newspaper、License Global、The Toy Book、KidScreen、Spanky Stokes、Anime Anime、Comic Natalie、4Gamer、Famitsu、36氪、虎嗅、钛媒体</div>
        </div>
        <div>
          <div class="method-group-title">B. RSS + Scrapling/Playwright 兜底（偶有反爬）</div>
          <div class="method-group-items">AWN 官网、KidScreen 官网、Crunchyroll News、ANN、License Global、Licensing International</div>
        </div>
        <div>
          <div class="method-group-title">C. 需登录后才能抓取</div>
          <div class="method-group-items">知乎雷报（知乎App扫码或Cookie）、小红书（App扫码，反爬极严）</div>
        </div>
        <div>
          <div class="method-group-title">D. RSSHub 聚合（中文站无官方RSS）</div>
          <div class="method-group-items">知乎热榜、微博热搜、B站国创动态、三文娱公众号、1905电影网、澎湃新闻文化频道</div>
        </div>
        <div>
          <div class="method-group-title">E. 直接 curl/浏览器访问（无需特殊处理）</div>
          <div class="method-group-items">国内动漫/ACG、潮玩/玩具、文创/文博、影视/游戏、财经/商业、央媒/综合、地方媒体等大部分国内站点</div>
        </div>
        <div>
          <div class="method-group-title">F. 停用/不可达</div>
          <div class="method-group-items">数娱梦工厂（DNS解析失败）、动漫之家资讯（子域名失效）、中外玩具礼品网（DNS解析失败）</div>
        </div>
      </div>
    </div>
  </details>`;
}

function matchesFilter(sec, filter) {
  if (filter === 'all') return true;
  if (filter === 'domestic') return sec.region === 'domestic';
  if (filter === 'overseas') return sec.region === 'overseas';
  if (filter === 'acg') return sec.tags.includes('acg');
  if (filter === 'toy') return sec.tags.includes('toy') || sec.tags.includes('cultural');
  if (filter === 'film') return sec.tags.includes('film') || sec.tags.includes('game');
  if (filter === 'finance') return sec.tags.includes('finance');
  if (filter === 'media') return sec.tags.includes('media') || sec.tags.includes('social');
  if (filter === 'jp') return sec.region === 'japan';
  return false;
}

function matchesSearch(item, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return item.n.toLowerCase().includes(q) ||
    item.t.toLowerCase().includes(q) ||
    item.d.toLowerCase().includes(q) ||
    item.m.toLowerCase().includes(q);
}

function renderContent() {
  const filter = document.querySelector('.filter-tab.active')?.dataset.filter || 'all';
  const query = document.getElementById('searchInput').value.trim();
  const container = document.getElementById('mainContent');

  document.getElementById('searchClear').style.display = query ? 'inline-block' : 'none';

  if (filter === 'rss') {
    container.innerHTML = renderRSS() + renderTools();
    return;
  }

  const filtered = sections.map(sec => {
    if (!matchesFilter(sec, filter)) return null;
    const items = sec.items.filter(it => matchesSearch(it, query));
    return items.length ? {...sec, items} : null;
  }).filter(Boolean);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-title">未找到匹配的站点</div>
      <p>尝试更换筛选条件或清除搜索词</p>
    </div>`;
    return;
  }

  let html = filtered.map(renderSection).join('');
  if (!query && (filter === 'all' || filter === 'domestic' || filter === 'overseas')) {
    html += renderRSS() + renderTools() + renderMethods();
  }
  html += `<div class="footer-note">
    <strong>维护记录</strong><br>
    2026-05-10 初始版本：整合现有 search-scope.md + 新增49个国内外站点 + 25个RSS源<br>
    2026-05-10 第一次扩库：新增28个国内来源，新增"中央媒体/综合资讯"和"地方媒体/城市文创"两个大分类<br>
    2026-05-17 抓取方式梳理：基于curl/Scrapling/Playwright实测，将95个站点按A-F六类归类<br>
    2026-05-17 全站表格重构：统一为5列格式，增加本地编辑功能<br>
    维护人：老贾 + Claude Code 协作维护
  </div>`;
  container.innerHTML = html;
}

// Modal functions
function openModal(title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingItem = null;
  editingSectionId = null;
}

function fillSectionSelect(selectedId) {
  const sel = document.getElementById('editSection');
  sel.innerHTML = sections.map(s => `<option value="${s.id}" ${s.id===selectedId?'selected':''}>${s.title}</option>`).join('');
}

function openEdit(secId, itemName) {
  itemName = decodeURIComponent(itemName);
  const sec = sections.find(s => s.id === secId);
  const item = sec?.items.find(i => i.n === itemName);
  if (!item) return;
  editingItem = item;
  editingSectionId = secId;

  document.getElementById('editName').value = item.n;
  document.getElementById('editUrl').value = item.u;
  document.getElementById('editTag').value = item.t;
  document.getElementById('editDesc').value = item.d;
  document.getElementById('editMethod').value = item.m;
  fillSectionSelect(secId);
  document.getElementById('editRegion').value = sec.region;
  document.getElementById('editTags').value = sec.tags.join(', ');

  openModal('编辑站点');
}

function openAdd(secId) {
  editingItem = null;
  editingSectionId = secId || sections[0]?.id;

  document.getElementById('editName').value = '';
  document.getElementById('editUrl').value = '';
  document.getElementById('editTag').value = '';
  document.getElementById('editDesc').value = '';
  document.getElementById('editMethod').value = '';
  fillSectionSelect(editingSectionId);
  const sec = sections.find(s => s.id === editingSectionId);
  document.getElementById('editRegion').value = sec?.region || 'domestic';
  document.getElementById('editTags').value = sec?.tags?.join(', ') || '';

  openModal('添加站点');
}

function saveItem() {
  const n = document.getElementById('editName').value.trim();
  const u = document.getElementById('editUrl').value.trim();
  const t = document.getElementById('editTag').value.trim();
  const d = document.getElementById('editDesc').value.trim();
  const m = document.getElementById('editMethod').value.trim();
  const targetSecId = document.getElementById('editSection').value;
  const region = document.getElementById('editRegion').value;
  const tagsStr = document.getElementById('editTags').value;
  const tags = tagsStr.split(',').map(s => s.trim()).filter(Boolean);

  if (!n || !u) { showToast('名称和URL必填'); return; }

  const newItem = {n, u, t: t || '未分类', d: d || '', m: m || ''};

  if (editingItem) {
    // Remove from old section
    const oldSec = sections.find(s => s.id === editingSectionId);
    if (oldSec) oldSec.items = oldSec.items.filter(i => i !== editingItem);
  }

  // Add to target section (create if not exists)
  let targetSec = sections.find(s => s.id === targetSecId);
  if (!targetSec) {
    targetSec = {id: targetSecId, title: targetSecId, region, tags, items: []};
    sections.push(targetSec);
  }
  targetSec.region = region;
  targetSec.tags = tags;

  // Check duplicate name
  const existing = targetSec.items.find(i => i.n === n && i !== editingItem);
  if (existing) { showToast('该分类下已存在同名站点'); return; }

  targetSec.items.push(newItem);
  saveData();
  updateStats();
  renderSidebar();
  renderContent();
  closeModal();
  showToast(editingItem ? '已保存修改' : '已添加站点');
}

function deleteItem(secId, itemName) {
  itemName = decodeURIComponent(itemName);
  if (!confirm(`确定删除「${itemName}」？`)) return;
  const sec = sections.find(s => s.id === secId);
  if (sec) {
    sec.items = sec.items.filter(i => i.n !== itemName);
    saveData();
    updateStats();
    renderSidebar();
    renderContent();
    showToast('已删除');
  }
}

function exportJSON() {
  const data = { sections, rssSections, tools, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ipnews-sources-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出JSON文件');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.sections) sections = data.sections;
      if (data.rssSections) rssSections = data.rssSections;
      if (data.tools) tools = data.tools;
      saveData();
      updateStats();
      renderSidebar();
      renderContent();
      showToast('导入成功');
    } catch(err) { showToast('JSON解析失败'); }
  };
  reader.readAsText(file);
}

function resetDefault() {
  if (!confirm('确定重置为默认数据？当前所有修改将丢失。')) return;
  localStorage.removeItem(STORAGE_KEY);
  sections = JSON.parse(JSON.stringify(defaultSections));
  rssSections = JSON.parse(JSON.stringify(defaultRssSections));
  tools = JSON.parse(JSON.stringify(defaultTools));
  saveData();
  updateStats();
  renderSidebar();
  renderContent();
  showToast('已重置为默认数据');
}

// Events
document.getElementById('filterTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-tab')) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  renderContent();
});

document.getElementById('searchInput').addEventListener('input', () => {
  renderContent();
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  renderContent();
});

window.addEventListener('scroll', () => {
  const secs = document.querySelectorAll('.section, .rss-section, .details-block');
  let current = '';
  secs.forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= 200) current = sec.id;
  });
  document.querySelectorAll('.sidebar-link').forEach(link => {
    link.classList.toggle('active', link.dataset.section === current);
  });
});

// Event delegation for edit/delete buttons
document.getElementById('mainContent').addEventListener('click', e => {
  const btn = e.target.closest('.source-action-btn');
  if (!btn) return;
  const action = btn.dataset.action;
  const secId = btn.dataset.section;
  const itemName = btn.dataset.name;
  if (action === 'edit') openEdit(secId, itemName);
  else if (action === 'delete') deleteItem(secId, itemName);
});

// Edit controls
document.getElementById('btnToggleEdit').addEventListener('click', () => {
  editMode = !editMode;
  document.getElementById('btnToggleEdit').classList.toggle('active', editMode);
  document.getElementById('btnToggleEdit').textContent = editMode ? '退出编辑模式' : '进入编辑模式';
  renderContent();
  showToast(editMode ? '编辑模式已开启' : '编辑模式已关闭');
});

document.getElementById('btnAddSite').addEventListener('click', () => {
  openAdd();
});

document.getElementById('btnExport').addEventListener('click', exportJSON);
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileOpsPanel').classList.toggle('show');
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
  e.target.value = '';
  document.getElementById('fileOpsPanel').classList.remove('show');
});
document.getElementById('btnReset').addEventListener('click', resetDefault);

// Modal events
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveItem);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Init
loadData();
updateStats();
renderSidebar();
renderContent();
</script>
</body>
</html>
